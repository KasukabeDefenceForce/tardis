name: release

on:
  pull_request_target:
    branches: [master]
    types: [closed]

  workflow_dispatch: # manual trigger

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install setuptools_scm
        run: pip install "setuptools_scm<7" git-cliff==2.6.1

      - name: Show current version
        run: python .ci-helpers/get_current_version.py

      - name: Get next version
        run: |
          python .ci-helpers/get_next_version.py
          echo "NEW_TAG=$(python .ci-helpers/get_next_version.py)" >> $GITHUB_ENV
      
      - name: Initialize release
        uses: softprops/action-gh-release@v1
        with:
          name: TARDIS v${{ env.NEW_TAG }}
          tag_name: release-${{ env.NEW_TAG }}
          body: "This release has been created automatically by the TARDIS continuous delivery pipeline."
          draft: true
      
      - name: Fetch Latest DOI from Zenodo
        id: fetch-doi
        run: |
            response=$(curl -s -L -H "Accept: application/x-bibtex" "https://zenodo.org/api/records/592480")
            doi=$(echo "$response" | jq -r '.doi')
            doi_url="https://doi.org/${doi}"
            doi_badge="![DOI Badge](https://img.shields.io/badge/DOI-${doi}-blue)"
            echo "doi_badge=${doi_badge}" >> $GITHUB_ENV
            echo "doi_url=${doi_url}" >> $GITHUB_ENV
        
      - name: Generate and process changelog
        run: |
          FULL_CHANGELOG=$(git cliff --config pyproject.toml --unreleased | sed -n '/^## Changelog/,$p' | grep -vE '^(ERROR|WARN)')
          TRUNCATED_CHANGELOG=$(echo "$FULL_CHANGELOG" | head -c 100000)
          if [ ${#FULL_CHANGELOG} -gt 100000 ]; then
            TRUNCATED_CHANGELOG+=$'\n\n... (truncated due to length, see CHANGELOG.md for full details)'
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$TRUNCATED_CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "$FULL_CHANGELOG" > FULL_CHANGELOG.md
        continue-on-error: true
      
      - name: Update release with changelog and DOI
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ env.NEW_TAG }}
          body: |
            This release has been created automatically by the TARDIS continuous delivery pipeline.
            ${{ env.doi_badge }}
            ${{ env.CHANGELOG }}
            
            A complete list of changes for this release is available at [CHANGELOG.md](https://github.com/tardis-sn/tardis/blob/master/CHANGELOG.md).
          files: |
            FULL_CHANGELOG.md
            conda-osx-arm64.lock
            conda-linux-64.lock
            conda-osx-64.lock
            conda-lock.yml
          draft: false