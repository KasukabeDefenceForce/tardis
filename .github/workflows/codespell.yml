name: codespell

on:
  push:
    branches:
      - master
  workflow_dispatch:
  pull_request_target:
    branches:
      - master

jobs:
  codespell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request_target'

      - name: Checkout pull/${{ github.event.number }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
        if: github.event_name == 'pull_request_target'

      - name: Setup environment
        uses: ./.github/actions/setup_env
        with:
          os-label: linux-64

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
  
      - name: Activate Environment and Run Codespell
        run: |
            source ~/.bashrc  # Ensure micromamba is initialized
            micromamba activate tardis  # Activate the environment
            codespell docs/
  